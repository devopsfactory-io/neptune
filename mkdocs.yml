site_name: Neptune
site_description: Terraform and OpenTofu PR automation with GitHub Actions
site_url: https://devopsfactory-io.github.io/neptune
repo_url: https://github.com/devopsfactory-io/neptune
repo_name: devopsfactory-io/neptune
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  logo: assets/logo-icon.svg
  favicon: assets/logo-icon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
    - content.code.annotate

nav:
  - Home: README.md
  - Getting Started:
      - Terramate Stacks: getting-started-terramate.md
      - Local Stacks: getting-started-local-stacks.md
      - Installation: installation.md
      - Workflow Comparison: workflow-comparison.md
  - User Guide:
      - Usage: usage.md
      - Configuration: configuration.md
      - Object Storage: object-storage.md
      - GitHub App & Lambda: github-app-and-lambda.md
  - Contributing: development.md

plugins:
  - search

extra:
  analytics:
    provider: google
    property: G-PLACEHOLDER
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/devopsfactory-io/neptune
      name: Neptune on GitHub

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
