# Optional: log level (DEBUG, INFO, ERROR). Default: INFO. Overridden by NEPTUNE_LOG_LEVEL env.
# log_level: INFO

repository:
  # gs://bucket or gs://bucket/prefix (GCS); s3://bucket or s3://bucket/prefix (AWS S3 or MinIO). See docs/object-storage.md for backend-specific env vars.
  object_storage: gs://terraform-internal-neptune-3dedd705-9275-592b-11c9-bc65c9821980
  stacks_management: terramate  # terramate or local
  branch: master
  plan_requirements:
    - undiverged
    - rebased
  apply_requirements:
    - approved
    - mergeable
    - undiverged
    - rebased
  allowed_workflow: default
  # automerge: false  # when true, enable PR auto-merge after successful apply (GitHub token needs pull_requests: write)

workflows:
  default:
    plan:
      steps:
        # once: false (default) = run once per changed stack in that stack's dir (no Terramate CLI needed)
        - run: echo "Custom command"
          once: true
        - run: terragrunt init -upgrade
        - run: terragrunt plan
    apply:
      depends_on:
        - plan
      steps:
        - run: echo "Custom command"
          once: true
        - run: terragrunt apply -auto-approve
        # Or use once: true and call CLI yourself: run: terramate run --changed -- terragrunt apply -auto-approve
