# Optional: log level (DEBUG, INFO, ERROR). Default: INFO. Overridden by NEPTUNE_LOG_LEVEL env.
# log_level: INFO

repository:
  # gs://bucket or gs://bucket/prefix (GCS); s3://bucket or s3://bucket/prefix (AWS S3 or MinIO). See docs/object-storage.md for backend-specific env vars.
  object_storage: gs://terraform-internal-neptune-3dedd705-9275-592b-11c9-bc65c9821980
  branch: master
  plan_requirements:
    - undiverged
    - rebased
  apply_requirements:
    - approved
    - mergeable
    - undiverged
    - rebased
  allowed_workflow: default

workflows:
  default:
    plan:
      steps:
        # terramate: true (default) = run once per changed stack in that stack's dir (no Terramate CLI needed)
        - run: echo "Custom command"
          terramate: false
        - run: terragrunt init -upgrade
        - run: terragrunt plan
    apply:
      depends_on:
        - plan
      steps:
        - run: echo "Custom command"
          terramate: false
        - run: terragrunt apply -auto-approve
        # Or use terramate: false and call CLI yourself: run: terramate run --changed -- terragrunt apply -auto-approve
