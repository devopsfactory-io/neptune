version: 2

before:
  hooks:
    - go mod tidy
    - sh -c "cd lambda && go mod tidy"

builds:
  - id: neptune
    main: .
    binary: neptune-{{ .Os}}-{{ .Arch}}
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: lambda
    dir: lambda
    main: .
    binary: bootstrap
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: neptune-archive
    ids:
      - neptune
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: neptune-binary
    ids:
      - neptune
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}

  - id: lambda-archive
    ids:
      - lambda
    formats:
      - zip
    name_template: >-
      neptune-webhook-{{ .Os}}-{{ .Arch}}
    strip_binary_directory: true
    wrap_in_directory: false

  - id: lambda-binary
    ids:
      - lambda
    formats:
      - binary
    name_template: >-
      neptune-webhook-{{ .Os}}-{{ .Arch}}

checksum:
  name_template: checksums.txt

release:
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GORELEASER_CURRENT_REPOSITORY }}/compare/{{ .PreviousTag }}...{{ .Tag }}

# With use: github-native, the release body is generated by GitHub's API; grouping
# and filtering are done via .github/release.yml and PR labels (groups/sort/filters
# below are ignored by GoReleaser when using github-native).
changelog:
  use: github-native
