version: 2

before:
  hooks:
    - go mod tidy
    - sh -c "cd lambda && go mod tidy"

builds:
  - id: neptune
    main: .
    binary: neptune-{{ .Os}}-{{ .Arch}}
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: lambda
    dir: lambda
    main: .
    binary: neptune-webhook-{{ .Os}}-{{ .Arch}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: neptune-archive
    ids:
      - neptune
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: neptune-binary
    ids:
      - neptune
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}

  - id: lambda-archive
    ids:
      - lambda
    formats:
      - zip
    name_template: >-
      neptune-webhook-{{ .Os}}-{{ .Arch}}
    strip_binary_directory: true
    wrap_in_directory: false

  - id: lambda-binary
    ids:
      - lambda
    formats:
      - binary
    name_template: >-
      neptune-webhook-{{ .Os}}-{{ .Arch}}

checksum:
  name_template: checksums.txt

release:
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GORELEASER_CURRENT_REPOSITORY }}/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  use: github-native
  # SHA as plain text; author as @Username when set, else Name <Email>. PR refs (#N) are autolinked by GitHub in release body.
  # Author: when use is github, .Author has Username/Name/Email; when fallback is git, use AuthorName/AuthorEmail (AuthorUsername not set).
  # format: "{{ .SHA }}: {{ .Message }} ({{ with index . \"Author\" }}{{ with .Username }}@{{ . }}{{ else }}{{ .Name }} <{{ .Email }}>{{ end }}{{ else }}{{ with .AuthorUsername }}@{{ . }}{{ else }}{{ .AuthorName }} <{{ .AuthorEmail }}>{{ end }}{{ end }})"
  sort: asc
  abbrev: 0
  groups:
    - title: 'Breaking Changes'
      regexp: '^.*?(\([[:word:]]+\))??!:.+$'
      order: 0
    - title: 'Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: 'Documentation'
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 300
    - title: 'Dependency updates'
      regexp: '^.*?(feat|fix|chore)\(deps?.+\)!?:.+$'
      order: 400
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: 'Other work'
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^.*?Bump(\([[:word:]]+\))?.+$'
      - '^.*?\[Bot\](\([[:word:]]+\))?.+$'
