# Used by GitHub when generating release notes (e.g. when GoReleaser calls the
# release notes API with changelog.use: github-native). Categories are applied
# by PR labels; first matching category wins. See docs/development.md.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Bug fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependency updates
      labels:
        - dependencies
    - title: Other work
      labels:
        - '*'
