name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions: {}

jobs:
  goreleaser:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          args: release --clean
          distribution: goreleaser
          version: "latest"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_REPOSITORY: ${{ github.repository }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.RELEASE_ROLE_ARN }}
          aws-region: us-east-2

      - name: Upload Lambda to S3
        run: |
          aws s3 cp dist/neptune-webhook-linux-amd64.zip \
            s3://neptune-lambda-s3/${{ github.ref_name }}/neptune-webhook-linux-amd64.zip

      - name: Deploy Lambda via CloudFormation
        run: |
          aws cloudformation update-stack \
            --stack-name neptune-webhook \
            --use-previous-template \
            --capabilities CAPABILITY_IAM \
            --parameters \
              ParameterKey=GitHubAppId,UsePreviousValue=true \
              ParameterKey=LambdaS3Bucket,UsePreviousValue=true \
              ParameterKey=LambdaS3Key,ParameterValue="${{ github.ref_name }}/neptune-webhook-linux-amd64.zip" \
              ParameterKey=WebhookSecretArn,UsePreviousValue=true \
              ParameterKey=PrivateKeySecretArn,UsePreviousValue=true \
              ParameterKey=GitHubAppSlug,UsePreviousValue=true \
              ParameterKey=NeptunePrLabel,UsePreviousValue=true
          aws cloudformation wait stack-update-complete --stack-name neptune-webhook

      - name: Smoke test webhook
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name neptune-webhook \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text)
          echo "::add-mask::$URL"
          # GET must return 405 (Method Not Allowed)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          [ "$STATUS" = "405" ] || { echo "Expected 405, got $STATUS"; exit 1; }
          echo "GET -> 405 OK"

          # POST with invalid signature must return 401 (Unauthorized)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL" \
            -H "X-Hub-Signature-256: sha256=invalid" \
            -H "X-GitHub-Event: ping" \
            -d '{}')
          [ "$STATUS" = "401" ] || { echo "Expected 401, got $STATUS"; exit 1; }
          echo "POST invalid-sig -> 401 OK"
