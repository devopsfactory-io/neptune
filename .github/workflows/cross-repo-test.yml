# End-to-end test against a real external repository (neptune-tests).
# Creates a PR on neptune-tests with dynamic stacks, waits for neptbot
# to trigger plan/apply via the full webhook flow, and verifies results.
#
# Runs in parallel with existing e2e and integration workflows.
name: cross-repo-test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
      - "release-**"

permissions:
  contents: read

jobs:
  changes:
    outputs:
      should-run: ${{ steps.changes.outputs.cross-repo == 'true' }}
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            cross-repo:
              - 'e2e/**'
              - 'cmd/**'
              - 'internal/**'
              - 'lambda/**'
              - '.github/workflows/cross-repo-test.yml'
              - 'go.*'

  cross-repo-test:
    needs: [changes]
    if: needs.changes.outputs.should-run == 'true' && github.event.pull_request.head.repo.fork != true
    name: cross-repo-test
    runs-on: ubuntu-latest
    env:
      ROOT_HCL_FILENAME: root.hcl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Build Neptune (verify compile)
        run: go build -o neptune .

      # Generate a token for the neptune-ci GitHub App to interact with neptune-tests
      - name: Generate neptune-ci App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.NEPTUNE_CI_APP_ID }}
          private-key: ${{ secrets.NEPTUNE_CI_PRIVATE_KEY }}
          owner: devopsfactory-io
          repositories: neptune-tests

      - name: Create test branch and PR on neptune-tests
        id: create-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEPTUNE_PR: ${{ github.event.pull_request.number }}
          NEPTUNE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          REPO="devopsfactory-io/neptune-tests"
          BRANCH="neptune-ci/pr-${NEPTUNE_PR}"

          echo "::group::Setup test branch"

          # Get main branch SHA
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')

          # Force-set the branch to MAIN_SHA: try to create it first; if it already
          # exists (HTTP 422 "Reference already exists") update it in-place via PATCH.
          # This avoids the delete→create race where GitHub may not have finished
          # processing the deletion before the create call arrives.
          CREATE_OUT=$(gh api "repos/${REPO}/git/refs" \
               --method POST \
               -f "ref=refs/heads/${BRANCH}" \
               -f "sha=${MAIN_SHA}" 2>&1) || {
            if echo "$CREATE_OUT" | grep -q '"Reference already exists"'; then
              echo "Branch already exists, force-updating to ${MAIN_SHA}..."
              gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
                --method PATCH \
                -f "sha=${MAIN_SHA}" \
                -F "force=true" > /dev/null
            else
              echo "ERROR: branch creation failed: $CREATE_OUT"
              exit 1
            fi
          }

          # Verify the ref now points at the expected SHA before we start
          # committing on top of it.
          ACTUAL_SHA=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --jq '.object.sha')
          if [ "${ACTUAL_SHA}" != "${MAIN_SHA}" ]; then
            echo "ERROR: branch SHA mismatch after setup (expected ${MAIN_SHA}, got ${ACTUAL_SHA})"
            exit 1
          fi
          echo "Branch ${BRANCH} is at ${ACTUAL_SHA} (verified)"

          echo "::endgroup::"
          echo "::group::Create dynamic stacks"

          # Create stack.hcl and terragrunt.hcl for two dynamic stacks in a single commit
          # to avoid GitHub API eventual consistency races when updating the branch ref.

          # Read current branch tip once — used as parent commit and base tree
          PARENT_SHA=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${PARENT_SHA}" --jq '.tree.sha')

          # Accumulate jq tree-entry fragments across both stacks
          TREE_ENTRIES='[]'

          for i in 1 2; do
            STACK_NAME="apps/web/ci-${NEPTUNE_PR}-${i}"

            # stack.hcl content
            STACK_HCL=$(cat <<STACK_EOF
          stack {
            name = "${STACK_NAME}"
          }
          STACK_EOF
          )

            # terragrunt.hcl content
            TG_HCL=$(cat <<TG_EOF
          terraform {
            source = "../../../_modules/null-stack"
          }

          include "root" {
            path = find_in_parent_folders("${ROOT_HCL_FILENAME}")
          }

          inputs = {
            stack_name = "${STACK_NAME}"
          }
          TG_EOF
          )

            # Create blobs for this stack's files
            STACK_BLOB=$(gh api "repos/${REPO}/git/blobs" \
              --method POST \
              -f "content=${STACK_HCL}" \
              -f "encoding=utf-8" \
              --jq '.sha')

            TG_BLOB=$(gh api "repos/${REPO}/git/blobs" \
              --method POST \
              -f "content=${TG_HCL}" \
              -f "encoding=utf-8" \
              --jq '.sha')

            # Append the two entries for this stack into the accumulated array
            TREE_ENTRIES=$(jq -n \
              --argjson existing "${TREE_ENTRIES}" \
              --arg stack_path "${STACK_NAME}/stack.hcl" \
              --arg stack_sha "${STACK_BLOB}" \
              --arg tg_path "${STACK_NAME}/terragrunt.hcl" \
              --arg tg_sha "${TG_BLOB}" \
              '$existing + [
                {path: $stack_path, mode: "100644", type: "blob", sha: $stack_sha},
                {path: $tg_path,    mode: "100644", type: "blob", sha: $tg_sha}
              ]')

            echo "Prepared stack: ${STACK_NAME}"
          done

          # Create ONE tree containing all 4 files, rooted at the current branch tree
          NEW_TREE=$(jq -n \
            --argjson tree "${TREE_ENTRIES}" \
            --arg base_tree "${BASE_TREE}" \
            '{base_tree: $base_tree, tree: $tree}' | \
            gh api "repos/${REPO}/git/trees" \
            --method POST \
            --input - \
            --jq '.sha')

          # Create ONE commit with that tree
          NEW_COMMIT=$(gh api "repos/${REPO}/git/commits" \
            --method POST \
            -f "message=ci: add dynamic stacks ci-${NEPTUNE_PR}-1 and ci-${NEPTUNE_PR}-2 for Neptune PR #${NEPTUNE_PR}" \
            -f "tree=${NEW_TREE}" \
            -f "parents[]=${PARENT_SHA}" \
            --jq '.sha')

          # Update the branch ref ONCE — eliminates the eventual consistency race
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            -f "sha=${NEW_COMMIT}" > /dev/null

          echo "Created stacks: apps/web/ci-${NEPTUNE_PR}-1 and apps/web/ci-${NEPTUNE_PR}-2"

          echo "::endgroup::"
          echo "::group::Verify branch tree"

          # Confirm both dynamic stack directories are present in the branch tree.
          # Use NEW_TREE directly instead of re-querying the branch ref to avoid
          # GitHub API eventual consistency returning a stale commit SHA.
          FINAL_TREE=$(gh api "repos/${REPO}/git/trees/${NEW_TREE}?recursive=1" --jq '[.tree[].path]')
          for i in 1 2; do
            EXPECTED_STACK="apps/web/ci-${NEPTUNE_PR}-${i}/stack.hcl"
            if ! echo "${FINAL_TREE}" | jq -e --arg p "${EXPECTED_STACK}" 'contains([$p])' > /dev/null; then
              echo "ERROR: expected file '${EXPECTED_STACK}' not found in branch tree"
              echo "Branch tree paths containing 'ci-': $(echo "${FINAL_TREE}" | jq '[.[] | select(contains("ci-"))]')"
              exit 1
            fi
            echo "Verified: ${EXPECTED_STACK} present in branch tree"
          done

          echo "::endgroup::"
          echo "::group::Create PR"

          # Close any existing PR from this branch
          EXISTING_PR=$(gh pr list --repo "${REPO}" --head "${BRANCH}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            gh pr close --repo "${REPO}" "${EXISTING_PR}" 2>/dev/null || true
          fi

          # Create PR with neptune-ref in the description and neptune label
          PR_URL=$(gh pr create \
            --repo "${REPO}" \
            --base main \
            --head "${BRANCH}" \
            --title "CI: Neptune PR #${NEPTUNE_PR} integration test" \
            --body "$(cat <<PR_EOF
          Automated integration test for devopsfactory-io/neptune#${NEPTUNE_PR}

          neptune-ref: ${NEPTUNE_SHA}

          This PR was created by Neptune CI to test plan/apply against real stacks.
          PR_EOF
          )" \
            --label neptune)

          PR_NUMBER=$(echo "$PR_URL" | sed 's|.*/||')
          if [ -z "${PR_NUMBER}" ]; then
            echo "ERROR: could not parse PR number from: ${PR_URL}"
            exit 1
          fi
          echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Created PR: ${PR_URL}"

          echo "::endgroup::"

      - name: Wait for plan to complete
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TEST_PR: ${{ steps.create-pr.outputs.pr-number }}
        run: |
          set -euo pipefail
          REPO="devopsfactory-io/neptune-tests"
          MAX_WAIT=600  # 10 minutes
          INTERVAL=15
          ELAPSED=0

          echo "Waiting for 'neptune plan' commit status on PR #${TEST_PR}..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Get the head SHA of the test PR
            HEAD_SHA=$(gh api "repos/${REPO}/pulls/${TEST_PR}" --jq '.head.sha')

            # Check commit statuses for "neptune plan"
            STATUS=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/statuses" \
              --jq '[.[] | select(.context == "neptune plan")] | sort_by(.updated_at) | last | .state // empty')

            if [ "$STATUS" = "success" ]; then
              echo "Plan succeeded!"
              break
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "Plan failed with status: ${STATUS}"
              exit 1
            fi

            echo "Plan status: ${STATUS:-pending} (${ELAPSED}s / ${MAX_WAIT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Timed out waiting for plan to complete"
            exit 1
          fi

      - name: Trigger apply via repository_dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TEST_PR: ${{ steps.create-pr.outputs.pr-number }}
        run: |
          set -euo pipefail
          REPO="devopsfactory-io/neptune-tests"

          # Retrieve current head SHA and branch from the test PR
          PR_INFO=$(gh api "repos/${REPO}/pulls/${TEST_PR}" \
            --jq '{sha: .head.sha, branch: .head.ref}')
          HEAD_SHA=$(echo "$PR_INFO" | jq -r '.sha')
          PR_BRANCH=$(echo "$PR_INFO" | jq -r '.branch')

          echo "Dispatching apply for PR #${TEST_PR} at ${HEAD_SHA} on branch ${PR_BRANCH}"

          # Use --input to build proper nested JSON for client_payload
          jq -n \
            --arg cmd "apply" \
            --arg pr_num "${TEST_PR}" \
            --arg repo "${REPO}" \
            --arg branch "${PR_BRANCH}" \
            --arg sha "${HEAD_SHA}" \
            '{
              event_type: "neptune-command",
              client_payload: {
                command: $cmd,
                pull_request_number: ($pr_num | tonumber),
                pull_request_repo_full: $repo,
                pull_request_branch: $branch,
                pull_request_sha: $sha
              }
            }' | \
          gh api "repos/${REPO}/dispatches" \
            --method POST \
            --input -

      - name: Wait for apply to complete
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TEST_PR: ${{ steps.create-pr.outputs.pr-number }}
        run: |
          set -euo pipefail
          REPO="devopsfactory-io/neptune-tests"
          MAX_WAIT=600
          INTERVAL=15
          ELAPSED=0

          echo "Waiting for 'neptune apply' commit status on PR #${TEST_PR}..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            HEAD_SHA=$(gh api "repos/${REPO}/pulls/${TEST_PR}" --jq '.head.sha')

            STATUS=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/statuses" \
              --jq '[.[] | select(.context == "neptune apply")] | sort_by(.updated_at) | last | .state // empty')

            if [ "$STATUS" = "success" ]; then
              echo "Apply succeeded!"
              break
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "Apply failed with status: ${STATUS}"
              exit 1
            fi

            echo "Apply status: ${STATUS:-pending} (${ELAPSED}s / ${MAX_WAIT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Timed out waiting for apply to complete"
            exit 1
          fi

      # - name: Verify automerge
      #   env:
      #     GH_TOKEN: ${{ steps.app-token.outputs.token }}
      #     TEST_PR: ${{ steps.create-pr.outputs.pr-number }}
      #   run: |
      #     set -euo pipefail
      #     REPO="devopsfactory-io/neptune-tests"

      #     # Check if the PR was merged or has auto-merge enabled
      #     PR_STATE=$(gh api "repos/${REPO}/pulls/${TEST_PR}" --jq '{state: .state, merged: .merged, auto_merge: .auto_merge}')
      #     echo "PR state: ${PR_STATE}"

      #     MERGED=$(echo "$PR_STATE" | jq -r '.merged')
      #     AUTO_MERGE=$(echo "$PR_STATE" | jq -r '.auto_merge')

      #     if [ "$MERGED" = "true" ]; then
      #       echo "PR was merged (automerge worked)"
      #     elif [ "$AUTO_MERGE" != "null" ]; then
      #       echo "Auto-merge is enabled on the PR"
      #     else
      #       echo "ERROR: PR is not merged and auto-merge is not enabled"
      #       exit 1
      #     fi

      - name: Cleanup
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TEST_PR: ${{ steps.create-pr.outputs.pr-number }}
          NEPTUNE_PR: ${{ github.event.pull_request.number }}
        run: |
          REPO="devopsfactory-io/neptune-tests"
          BRANCH="neptune-ci/pr-${NEPTUNE_PR}"

          # Close PR if still open
          if [ -n "${TEST_PR}" ]; then
            PR_STATE=$(gh api "repos/${REPO}/pulls/${TEST_PR}" --jq '.state' 2>/dev/null || echo "unknown")
            if [ "$PR_STATE" = "open" ]; then
              echo "Closing test PR #${TEST_PR}..."
              gh pr close --repo "${REPO}" "${TEST_PR}" 2>/dev/null || true
            fi
          fi

          # Delete branch
          echo "Deleting branch ${BRANCH}..."
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" --method DELETE 2>/dev/null || true

          echo "Cleanup complete"

  skip:
    needs: [changes]
    if: needs.changes.outputs.should-run == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No cross-repo-relevant changes, skipping cross-repo-test"
