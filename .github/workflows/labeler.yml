name: labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: "Execute Labeler"
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6
