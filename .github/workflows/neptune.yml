# Lambda integration test: triggered by the Neptune GitHub App (or self-hosted Lambda) via repository_dispatch.
# When the integration workflow posts "@neptbot plan" on the PR, the webhook triggers this workflow.
# This workflow only verifies that the Lambda received the event and ran; it does not install or run Neptune.
name: neptune

on:
  repository_dispatch:
    types: [neptune-command]

concurrency:
  group: neptune-${{ github.event.client_payload.pull_request_number }}
  cancel-in-progress: false

permissions:
  pull-requests: write

jobs:
  lambda-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Comment Lambda integration success
        env:
          PR_NUM: ${{ github.event.client_payload.pull_request_number }}
          BRANCH: ${{ github.event.client_payload.pull_request_branch }}
          COMMAND: ${{ github.event.client_payload.command }}
          SHA: ${{ github.event.client_payload.pull_request_sha }}
          REPO: ${{ github.event.client_payload.pull_request_repo_full }}
        run: |
          BODY="Lambda integration test executed with success...

          **client_payload:**
          - PR: #${PR_NUM}
          - Branch: ${BRANCH}
          - Command: ${COMMAND}
          - SHA: ${SHA}
          - Repo: ${REPO}"
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            -d "$(jq -n --arg b "$BODY" '{body: $b}')"
