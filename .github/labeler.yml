# Apply "neptune" label to every PR (any changed file matches).
# v5+ requires each label to be an array of config options (changed-files, etc.).
neptune:
  - changed-files:
    - any-glob-to-any-file: '**'
# Apply "dependencies" when dependency-related files change (Renovate PRs).
dependencies:
  - changed-files:
    - any-glob-to-any-file:
        - 'go.mod'
        - 'go.sum'
        - 'lambda/go.mod'
        - 'lambda/go.sum'
        - '.github/workflows/**/*.yml'
