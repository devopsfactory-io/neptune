# actions/labeler: path-based (changed-files) and head-branch (regex) rules.
# Head-branch rules: breaking-change (!), feature (feat), enhancement (enhance),
# bug (fix, no dep), github-actions (ci or .github/workflows/ changes).
neptune:
  - changed-files:
    - any-glob-to-any-file: '**'
breaking-change:
  - head-branch: ['!']
feature:
  - head-branch: ['^feat']
enhancement:
  - head-branch: ['^enhance']
bug:
  - head-branch: ['^fix(?!.*dep).*']
github-actions:
  - any:
    - head-branch: ['^ci']
    - changed-files:
        - any-glob-to-any-file: '.github/workflows/**'
dependencies:
  - any:
    - changed-files:
        - any-glob-to-any-file:
            - 'go.mod'
            - 'go.sum'
            - 'lambda/go.mod'
            - 'lambda/go.sum'
    - head-branch: ['\\(deps\\)']
documentation:
  - changed-files:
    - any-glob-to-any-file:
        - 'docs/**'
        - '*.md'
        - 'README*'
        - '.cursor/**/*.md'
        - 'AGENTS.md'
        - 'CONTRIBUTING.md'
