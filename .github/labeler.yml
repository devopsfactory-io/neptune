# actions/labeler: path-based (changed-files) and head-branch (regex) rules.
# Head-branch rules: breaking-change (!), feature (feat), enhancement (enhance),
# bug (fix, no dep), github-actions (ci).
neptune:
  - changed-files:
    - any-glob-to-any-file: '**'
breaking-change:
  - head-branch: ['!']
feature:
  - head-branch: ['^feat']
enhancement:
  - head-branch: ['^enhance']
bug:
  - head-branch: ['^fix(?!.*dep).*']
github-actions:
  - head-branch: ['^ci']
dependencies:
  - changed-files:
    - any-glob-to-any-file:
        - 'go.mod'
        - 'go.sum'
        - 'lambda/go.mod'
        - 'lambda/go.sum'
        - '.github/workflows/**/*.yml'
documentation:
  - changed-files:
    - any-glob-to-any-file:
        - 'docs/**'
        - '*.md'
        - 'README*'
        - '.cursor/**/*.md'
        - 'AGENTS.md'
        - 'CONTRIBUTING.md'
